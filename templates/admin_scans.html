<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Scans</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
   <nav>
    <a href="/admin/dashboard" style="text-decoration:none; color:white;">
        <h1>🌿 Crop Disease Identifier</h1>
    </a>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/scans">All Scans</a>
        <a href="/about">About</a>
        <a href="/admin/logout">Logout</a>
    </div>
</nav>
    <div class="container">
        <h2 class="page-title">📋 All Scans</h2>
        <table class="history-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Farmer</th>
                    <th>Image</th>
                    <th>Crop</th>
                    <th>Disease</th>
                    <th>Severity</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for scan in scans %}
                <tr>
                    <td>{{ scan[0] }}</td>
                    <td>{{ scan[8] }}</td>
                    <td><img src="/uploads/{{ scan[1] }}" style="width:50px; height:50px; object-fit:cover; border-radius:6px;"></td>
                    <td>{{ scan[2] }}</td>
                    <td>{{ scan[3] }}</td>
                    <td class="severity-{{ scan[5] | lower }}">{{ scan[5] }}</td>
                    <td>{{ scan[6] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
